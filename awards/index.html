<!DOCTYPE html>

<head>

    <title>学会・受賞履歴 | 杉浦健太郎</title>

    <link rel="shortcut icon" href="../fig/icon.svg" type="image/x-icon">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
          crossorigin="anonymous">
    <!-- 共通CSS → 学会・受賞ページ専用CSS の順に読み込む -->
    <link rel="stylesheet" href="../css/stylesheet.css">
    <link rel="stylesheet" href="../css/award.css">
</head>
<body>

    <!-- ナビゲーションバー -->
    <header>
        <div class="container">
            <div class="header-left">
                <a href="../"><img class="logo" src="../fig/icon.svg" alt="ロゴ"></a>
            </div>
            <span class="fa fa-bars menu-icon" aria-label="メニュー"></span>
            <div class="header-right" id="page-link">
                <a href="../profile/">プロフィール</a>
                <a href="../awards/">学会・受賞</a>
                <a href="../study/">研究内容</a>
                <a href="../hobby/">趣味</a>
            </div>
        </div>
    </header>

    <!-- ページコンテンツ -->
    <div class="award-wrapper">

        <!-- ページ見出しバナー（Unsplash: Giorgio Trovato） -->
        <div class="heading-contents">
            <h1>学会・受賞履歴</h1>
        </div>

        <!-- ============================================================
             フィルタバー
             achievements.js が CATEGORIES を読み込んで動的に生成する。
             JS が無効な場合は空のままになる。
             ============================================================ -->
        <div id="achievement-filter"></div>

        <!-- ============================================================
             タイムラインリスト
             achievements.js が ACHIEVEMENTS を読み込んで動的に描画する。
             年度順（降順）のタイムライン形式で表示される。
             ============================================================ -->
        <div id="achievement-list"></div>

    </div><!-- /.award-wrapper -->

    <!-- フッター -->
    <footer>
        <div class="container">
            <img src="../fig/icon.svg" alt="アイコン">
            <p>Copyright &copy; 2024 Kentaro Sugiura. All Rights Reserved.</p>
            <p class="photo-credits">
                Photo by
                <a href="https://unsplash.com/@giorgiotrovato?utm_source=portfolio&amp;utm_medium=referral"
                   target="_blank" rel="noopener noreferrer">Giorgio Trovato</a>
                on <a href="https://unsplash.com/?utm_source=portfolio&amp;utm_medium=referral"

    <script src="https://code.jquery.com/jquery-3.4.1.min.js"
            integrity="sha256-CSXorXvZcTkaix6Yvo6HppcZGetbYMGWSFlBw8HfCJo="
